<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
        }

        .container {
            background: white;
            width: 300px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: gray;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="aparnak,jpg" alt="Profile Photo">
        <h2>Aparna K M</h2>
        <p>i am cse student</p>
        <p>I love coding and building projects 🚀</p>

        <a href="#" class="btn">Contact Me</a>
    </div>

</body>
</html>
